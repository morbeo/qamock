[tools]
python = "3.12"
uv = "latest"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.test]
description = "Run tests"
run = "uv run python -m pytest"

[tasks.coverage]
description = "Run tests with coverage report"
run = "uv run python -m pytest --cov=qamock --cov-report=term-missing"

[tasks.release]
description = "Bump version and release"
usage = 'arg "[bump]" help="patch|minor|major or explicit x.y.z" default="patch"'
run = "uv run scripts/release.py ${usage_bump?}"
